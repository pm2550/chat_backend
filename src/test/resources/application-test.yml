server:
  port: 0

spring:
  application:
    name: chat-app-backend-test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    open-in-view: true

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      fail-on-empty-beans: false

jwt:
  secret: Y2hhdEFwcFNlY3JldEtleUZvckpXVFRva2VuU2lnbmluZ1RoaXNJc0FMb25nZXJLZXlGb3JTZWN1cml0eQ==
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

file:
  upload:
    path: ./test-uploads/
    avatar-path: ./test-uploads/avatars/
    message-path: ./test-uploads/messages/
    max-size: 52428800

websocket:
  allowed-origins: "*"
  endpoint: /ws

cors:
  allowed-origins: http://localhost:3000
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: Authorization,Content-Type,X-Requested-With
  max-age: 3600

turn:
  server-host: 192.9.134.169
  server-port: 3478
  shared-secret: test-turn-secret
  credential-ttl-seconds: 1800

rate-limit:
  requests-per-minute: 1000
  auth-requests-per-minute: 100

llm:
  openai:
    api-key: test-key
    base-url: https://api.openai.com/v1
    model: gpt-4o
  claude:
    api-key: test-key
    base-url: https://api.anthropic.com/v1
    model: claude-sonnet-4-20250514
  deepseek:
    api-key: test-key
    base-url: https://api.deepseek.com/v1
    model: deepseek-chat
  ollama:
    base-url: http://localhost:11434
    model: llama3
  dashscope:
    api-key:
    base-url: http://localhost/dashscope/v1
    model: qwen-plus

bot:
  rate-limit:
    agent-runs-per-minute: 1000
    web-search-per-minute: 1000

logging:
  level:
    com.chatapp: DEBUG
    org.springframework.security: WARN
