server:
  port: ${SERVER_PORT:8080}
  # Context-path intentionally left blank: controllers include /api and /api/v1 in their mappings.
  # Previously setting context-path=/api caused double /api prefix and 404s in real HTTP.

spring:
  application:
    name: chat-app-backend

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:chatapp}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:pimao1011}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    locations: classpath:db/migration
    baseline-version: 0

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      fail-on-empty-beans: false

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:Y2hhdEFwcFNlY3JldEtleUZvckpXVFRva2VuU2lnbmluZ1RoaXNJc0FMb25nZXJLZXlGb3JTZWN1cml0eQ==}
  access-token-expiration: 900000      # 15 minutes
  refresh-token-expiration: 604800000  # 7 days

# File upload configuration
file:
  upload:
    path: ${FILE_UPLOAD_PATH:./uploads/}
    avatar-path: ${FILE_UPLOAD_PATH:./uploads/}avatars/
    message-path: ${FILE_UPLOAD_PATH:./uploads/}messages/
    max-size: 52428800  # 50MB

# WebSocket configuration
websocket:
  allowed-origins: ${WS_ALLOWED_ORIGINS:*}
  endpoint: /ws

# CORS configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080,http://localhost:5000}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: Authorization,Content-Type,X-Requested-With
  max-age: 3600

# App version / OTA update artifact storage
app:
  version:
    storage-path: ${APP_VERSION_STORAGE_PATH:./uploads/app-releases/}
    max-artifact-size: 524288000  # 500MB

# Rate limiting
rate-limit:
  requests-per-minute: ${RATE_LIMIT_RPM:60}
  auth-requests-per-minute: ${RATE_LIMIT_AUTH_RPM:10}

# LLM configuration
llm:
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model: ${OPENAI_MODEL:gpt-4o}
  claude:
    api-key: ${CLAUDE_API_KEY:}
    base-url: ${CLAUDE_BASE_URL:https://api.anthropic.com/v1}
    model: ${CLAUDE_MODEL:claude-sonnet-4-20250514}
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}
    model: ${DEEPSEEK_MODEL:deepseek-chat}
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:llama3}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.chatapp: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
