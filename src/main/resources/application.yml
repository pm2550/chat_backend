server:
  port: ${SERVER_PORT:8080}
  # Context-path intentionally left blank: controllers include /api and /api/v1 in their mappings.
  # Previously setting context-path=/api caused double /api prefix and 404s in real HTTP.

spring:
  application:
    name: chat-app-backend

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:chatapp}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&sslMode=PREFERRED&serverTimezone=UTC
    username: ${DB_USERNAME:chatapp}
    # Intentionally blank by default: dev/prod should fail fast unless DB_PASSWORD is explicit.
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    locations: classpath:db/migration
    baseline-version: 0

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      fail-on-empty-beans: false

# Auth client-side password hashing
auth:
  client-salt-hmac-secret: ${CLIENT_SALT_HMAC_SECRET:dev-only-do-not-use-in-prod-rotate-immediately}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:Y2hhdEFwcFNlY3JldEtleUZvckpXVFRva2VuU2lnbmluZ1RoaXNJc0FMb25nZXJLZXlGb3JTZWN1cml0eQ==}
  access-token-expiration: 900000      # 15 minutes
  refresh-token-expiration: 604800000  # 7 days

# File upload configuration
file:
  storage:
    upload-dir: ${FILE_UPLOAD_PATH:uploads}
    avatar-dir: avatars
    chat-file-dir: chat-files
    workspace-file-dir: workspace-files
    background-dir: backgrounds
    workspace-provider: ${WORKSPACE_STORAGE_PROVIDER:LOCAL}
    workspace-endpoint: ${WORKSPACE_STORAGE_ENDPOINT:}
    workspace-access-key: ${WORKSPACE_STORAGE_ACCESS_KEY:}
    workspace-secret-key: ${WORKSPACE_STORAGE_SECRET_KEY:}
    workspace-bucket: ${WORKSPACE_STORAGE_BUCKET:pm-chat-workspace}
    workspace-region: ${WORKSPACE_STORAGE_REGION:}
    workspace-secure: ${WORKSPACE_STORAGE_SECURE:true}
    workspace-prefix: ${WORKSPACE_STORAGE_PREFIX:workspace-files/}
    scan-mode: ${WORKSPACE_FILE_SCAN_MODE:basic}
    scan-fail-open: ${WORKSPACE_FILE_SCAN_FAIL_OPEN:false}
    clamav-host: ${CLAMAV_HOST:127.0.0.1}
    clamav-port: ${CLAMAV_PORT:3310}
    clamav-timeout-ms: ${CLAMAV_TIMEOUT_MS:5000}
    master-key: ${FILE_STORAGE_MASTER_KEY:}
    encrypt-legacy-on-startup: ${FILE_ENCRYPT_LEGACY:false}
    decrypt-legacy-on-startup: ${FILE_DECRYPT_LEGACY:false}
    legacy-encrypt-exclude-dirs: ${FILE_LEGACY_EXCLUDE_DIRS:app-releases}
    streaming-threshold-bytes: ${FILE_STREAMING_THRESHOLD:1048576}
    max-file-size: 52428800
    max-avatar-size: 5242880
    max-background-size: 2097152
    allowed-avatar-types: jpg,jpeg,png,gif,webp
    allowed-background-types: jpg,jpeg,png,webp
    allowed-chat-file-types: jpg,jpeg,png,gif,webp,pdf,doc,docx,txt,zip,rar,mp3,m4a,wav,aac,ogg,webm,mp4,mov
  upload:
    path: ${FILE_UPLOAD_PATH:./uploads/}
    avatar-path: ${FILE_UPLOAD_PATH:./uploads/}avatars/
    message-path: ${FILE_UPLOAD_PATH:./uploads/}messages/
    max-size: 52428800  # 50MB

message:
  retention:
    enabled: ${MESSAGE_RETENTION_ENABLED:true}
    days: ${MESSAGE_RETENTION_DAYS:30}
    batch-size: ${MESSAGE_RETENTION_BATCH_SIZE:500}
    cleanup-cron: ${MESSAGE_RETENTION_CLEANUP_CRON:0 30 3 * * *}

# WebSocket configuration
websocket:
  allowed-origins: ${WS_ALLOWED_ORIGINS:*}
  endpoint: /ws

# CORS configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: Authorization,Content-Type,X-Requested-With
  max-age: 3600

# App version / OTA update artifact storage
app:
  version:
    storage-path: ${APP_VERSION_STORAGE_PATH:./uploads/app-releases/}
    publish-token: ${PMCHAT_PUBLISH_TOKEN:}
    max-artifact-size: 524288000  # 500MB
  webrtc:
    ice-servers: ${WEBRTC_ICE_SERVERS:stun:192.9.134.169:3478,turn:192.9.134.169:3478?transport=udp,turn:192.9.134.169:3478?transport=tcp}
    turn-static-auth-secret: ${TURN_STATIC_AUTH_SECRET:}
    turn-ttl-seconds: ${TURN_TTL_SECONDS:1800}

# TURN REST API credentials for browser WebRTC fallback relay.
turn:
  server-host: ${TURN_SERVER_HOST:192.9.134.169}
  server-port: ${TURN_SERVER_PORT:3478}
  shared-secret: ${TURN_STATIC_AUTH_SECRET:}
  credential-ttl-seconds: ${TURN_CREDENTIAL_TTL_SECONDS:1800}

web-push:
  vapid:
    public-key: ${WEB_PUSH_VAPID_PUBLIC_KEY:}
    private-key: ${WEB_PUSH_VAPID_PRIVATE_KEY:}
    subject: ${WEB_PUSH_VAPID_SUBJECT:mailto:admin@pm2550.com}

provider-vault:
  # Base64 or raw secret material. If blank, the service derives from jwt.secret.
  master-key: ${PROVIDER_VAULT_MASTER_KEY:${JWT_SECRET:}}

image-generation:
  hermes:
    draw-url: ${HERMES_IMAGE_DRAW_URL:http://hermes-image-api:8765/draw}
    image-root: ${HERMES_IMAGE_CACHE_ROOT:/data2/hermes/data/cache/images}
    timeout-seconds: ${HERMES_IMAGE_TIMEOUT_SECONDS:240}

# Rate limiting
rate-limit:
  requests-per-minute: ${RATE_LIMIT_RPM:60}
  auth-requests-per-minute: ${RATE_LIMIT_AUTH_RPM:60}

# LLM configuration
llm:
  required: ${LLM_REQUIRED:false}
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model: ${OPENAI_MODEL:gpt-4o}
  claude:
    api-key: ${CLAUDE_API_KEY:}
    base-url: ${CLAUDE_BASE_URL:https://api.anthropic.com/v1}
    model: ${CLAUDE_MODEL:claude-sonnet-4-20250514}
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}
    model: ${DEEPSEEK_MODEL:deepseek-chat}
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:llama3}
    api-key: ${OLLAMA_API_KEY:}
  hermes:
    api-key: ${HERMES_API_KEY:}
    base-url: ${HERMES_BASE_URL:http://127.0.0.1:8642/v1}
    model: ${HERMES_MODEL:hermes-agent}
    chat-url: ${HERMES_CHAT_URL:http://127.0.0.1:8765/chat}
    vision-model: ${HERMES_VISION_MODEL:grok-4.3}
    internal-token: ${HERMES_INTERNAL_TOKEN:}
  dashscope:
    # Chat is routed through an OpenAI-compatible proxy (self-hosted dashscope-proxy is keyless).
    # Image generation is unaffected and keeps using its own per-user DashScope credential.
    api-key: ${DASHSCOPE_API_KEY:}
    base-url: ${DASHSCOPE_BASE_URL:http://localhost/dashscope/v1}
    model: ${DASHSCOPE_MODEL:qwen-plus}
  kimi:
    # Kimi Coding API, mirrored from OpenClaw's kimi/kimi-coding provider.
    # OpenClaw's canonical endpoint is https://api.kimi.com/coding/ with
    # anthropic-messages; PM chat uses the OpenAI-compatible /v1 route so
    # existing tool_calls continue to work.
    api-key: ${KIMI_API_KEY:${KIMICODE_API_KEY:}}
    base-url: ${KIMI_BASE_URL:https://api.kimi.com/coding/v1}
    model: ${KIMI_MODEL:kimi-code}

# Per-bot / per-room rate limiting for agent runs (bucket4j; <=0 disables a limit).
bot:
  rate-limit:
    agent-runs-per-minute: ${BOT_AGENT_RUNS_PER_MINUTE:30}
    web-search-per-minute: ${BOT_WEB_SEARCH_PER_MINUTE:60}

# SSRF policy: internal hosts a user-supplied URL (webhook/base_url/media) may target.
outbound-url:
  owner-allowed-internal-hosts: ${OUTBOUND_URL_ALLOWED_INTERNAL_HOSTS:127.0.0.1,localhost,172.17.0.1}

# Self-hosted aggregated search backing the bot web_search tool.
searxng:
  base-url: ${SEARXNG_BASE_URL:http://172.17.0.1:8888}

agent:
  product-faq: |
    PM chat is a private team chat and AI workspace. It has five main areas:
    Messages, Workspace, Contacts, AI Assistant, and Me.
    Users can chat in private rooms or groups, send text, images, files, voice
    messages, and use voice/video calls where available.
    AI agents can be mentioned in chats, read the current room context, use
    approved server/client tools, understand image attachments through the
    Hermes vision pipeline, and write useful outputs back into PM chat.
    PM chat uses points for paid AI features. Users may have free daily quotas
    per feature plus paid points. Agents should use the points lookup tools
    when users ask about their own balance or feature costs.
    产品说明：PM chat 是把聊天、资料库、联系人、AI 助手和个人中心放在一起的协作工具；
    可以群聊/私聊、发图片和文件、语音/视频通话、@Agent 处理问题，并用积分管理 AI 功能消耗。
  gateway:
    enabled: ${AGENT_GATEWAY_ENABLED:false}
    provider: ${AGENT_GATEWAY_PROVIDER:generic}
    base-url: ${AGENT_GATEWAY_BASE_URL:}
    execute-path: ${AGENT_GATEWAY_EXECUTE_PATH:/api/v1/agent/tasks}
    health-path: ${AGENT_GATEWAY_HEALTH_PATH:/actuator/health}
    api-key: ${AGENT_GATEWAY_API_KEY:}
    agent-id: ${AGENT_GATEWAY_AGENT_ID:}
    session-key-prefix: ${AGENT_GATEWAY_SESSION_KEY_PREFIX:chatapp}
    task-timeout-seconds: ${AGENT_GATEWAY_TASK_TIMEOUT_SECONDS:600}
    connect-timeout-ms: ${AGENT_GATEWAY_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${AGENT_GATEWAY_READ_TIMEOUT_MS:60000}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.chatapp: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
